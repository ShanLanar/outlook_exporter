name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhängigkeiten installieren
        # pywin32 ist Windows-only und wird auf Linux dank Marker übersprungen
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests
        run: python -m pytest tests/ -q --tb=short
